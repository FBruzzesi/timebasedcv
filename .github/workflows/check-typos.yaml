name: Check spelling typos

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main

jobs:

  run-typos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check spelling
        uses: crate-ci/typos@master
        with:
          files: .
